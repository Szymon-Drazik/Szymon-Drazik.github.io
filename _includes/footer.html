<footer class="d-flex w-100 justify-content-center">
  <div class="d-flex justify-content-between align-items-center">
    <div class="footer-left">
      <p class="mb-0">
        © {{ site.time | date: '%Y' }}
        <a href="{{ site.social.links[0] }}">{{ site.social.name }}</a>.
        Some rights reserved.
      </p>
    </div>
  </div>
</footer>
<script>
  (function() {
    var userLang = navigator.language || navigator.userLanguage;
    var path = window.location.pathname;
    
    // Sprawdzamy, czy użytkownik jest dokładnie na stronie głównej
    // (Dostosowane do Twojej domeny na GitHub Pages)
    var isRoot = path === "/" || path === "/index.html" || path === "";

    // Jeśli język przeglądarki nie jest polski ORAZ jesteśmy na głównej
    if (!userLang.startsWith('pl') && isRoot) {
      window.location.replace("/en/");
    }
  })();
</script>
